server {
  listen 80;
  server_name _;

  # Allow larger uploads (images/PDFs) to be proxied to the API.
  # Default is 1m, which can easily trigger 413.
  client_max_body_size 50m;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy to the xScanner API (internal Docker network)
  location /api/ {
    proxy_pass http://xscanner-api:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
