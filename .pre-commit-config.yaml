# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        # Check all Python files, not just src/
      - id: ruff-format
        # Format all Python files, not just src/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - pydantic
        args: [--ignore-missing-imports]
        files: ^src/

  # Unit tests (fast, always run)
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: pytest tests/unit -v --tb=short
        language: system
        pass_filenames: false
        always_run: true

  # Integration tests (slower, requires API keys, run before push)
  - repo: local
    hooks:
      - id: pytest-integration
        name: pytest integration tests
        entry: pytest tests/integration -v --tb=short -m integration
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
