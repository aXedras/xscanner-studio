# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        # Check all Python files, not just src/
        exclude: ^tmp/
      - id: ruff-format
        # Format all Python files, not just src/
        exclude: ^tmp/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - pydantic
        args: [--ignore-missing-imports]
        files: ^src/

  # Unit tests (fast, always run on commit)
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: bash -c 'source venv/bin/activate && python -m pytest tests/unit -v --tb=short'
        language: system
        pass_filenames: false
        always_run: true

  # Integration tests (run before push)
  - repo: local
    hooks:
      - id: pytest-integration
        name: pytest integration tests
        entry: bash -c 'source venv/bin/activate && python -m pytest tests/integration -v --tb=short'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Studio: Prettier format check (only for studio/ files)
  - repo: local
    hooks:
      - id: studio-prettier
        name: studio prettier check
        entry: bash -c 'cd studio && npm run format:check'
        language: system
        files: ^studio/.*\.(ts|tsx|css|json)$
        pass_filenames: false

  # Studio: ESLint (only for studio/ files)
  - repo: local
    hooks:
      - id: studio-eslint
        name: studio eslint
        entry: bash -c 'cd studio && npm run lint'
        language: system
        files: ^studio/.*\.(ts|tsx)$
        pass_filenames: false

  # Studio: TypeScript type check (only for studio/ files)
  - repo: local
    hooks:
      - id: studio-typecheck
        name: studio type check
        entry: bash -c 'cd studio && npm run type-check'
        language: system
        files: ^studio/.*\.(ts|tsx)$
        pass_filenames: false

  # Studio: Unit tests (only for studio/ files)
  - repo: local
    hooks:
      - id: studio-test-unit
        name: studio unit tests
        entry: bash -c 'cd studio && npm run test:unit'
        language: system
        files: ^studio/
        pass_filenames: false

  # Studio: Integration tests (only for studio/ files, run before push)
  - repo: local
    hooks:
      - id: studio-test-integration
        name: studio integration tests
        entry: |
          bash -c '
            set -euo pipefail

            # Load env files (pre-commit does not automatically load .env/.env.local)
            if [ -f .env.local ]; then
              set -a
              . ./.env.local
              set +a
            elif [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            if [ -f studio/.env.local ]; then
              set -a
              . ./studio/.env.local
              set +a
            elif [ -f studio/.env ]; then
              set -a
              . ./studio/.env
              set +a
            fi

            if [ -n "${VITE_API_URL:-}" ]; then
              API_URL="$VITE_API_URL"
            elif [ -n "${SERVER_PORT:-}" ]; then
              API_URL="http://127.0.0.1:${SERVER_PORT}"
            else
              API_URL="http://127.0.0.1:8000"
            fi

            HEALTH_URL="${API_URL%/}/health"

            if ! curl -fsS "$HEALTH_URL" >/dev/null; then
              echo "ERROR: xScanner API is not reachable: $HEALTH_URL" >&2
              echo "Start it (example): make start-server" >&2
              echo "Or set VITE_API_URL (or SERVER_PORT) so the hook finds the server." >&2
              exit 1
            fi

            cd studio
            VITE_API_URL="$API_URL" npm run test:integration
          '
        language: system
        files: ^studio/
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Studio: i18n validation (only for studio/ files)
  - repo: local
    hooks:
      - id: studio-i18n
        name: studio i18n validation
        entry: bash -c 'cd studio && npm run check:i18n:all'
        language: system
        files: ^studio/(src/.*\.(ts|tsx)|src/locales/.*/translation\.json)$
        pass_filenames: false

  # Studio: DB types must match migrations
  - repo: local
    hooks:
      - id: studio-db-types
        name: studio db types up-to-date
        entry: bash -c 'cd studio && npm run db:check'
        language: system
        files: ^(supabase/migrations/.*\.sql|studio/src/lib/supabase/database\.types\.ts)$
        pass_filenames: false

  # Server: DB types must match migrations
  - repo: local
    hooks:
      - id: server-db-types
        name: server db types up-to-date
        entry: bash -c 'source venv/bin/activate && python -m scripts.db.check_db_types'
        language: system
        files: ^(supabase/migrations/.*\.sql|src/xscanner/server/db_types\.py|scripts/db/.*\.py)$
        pass_filenames: false

  # E2E tests (real API calls, run before push if OPENAI_API_KEY is set)
  - repo: local
    hooks:
      - id: pytest-e2e
        name: pytest e2e tests
        entry: bash -c 'source venv/bin/activate && if [ -n "$OPENAI_API_KEY" ]; then python -m pytest tests/e2e/ -v --tb=short -m e2e; else echo "⚠️  E2E tests skipped (OPENAI_API_KEY not set)"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
