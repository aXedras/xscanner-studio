# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        # Check all Python files, not just src/
      - id: ruff-format
        # Format all Python files, not just src/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - pydantic
        args: [--ignore-missing-imports]
        files: ^src/

  # Unit tests (fast, always run on commit)
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: bash -c 'source venv/bin/activate && python -m pytest tests/unit -v --tb=short'
        language: system
        pass_filenames: false
        always_run: true

  # Integration tests (mocked APIs, no keys needed, run on commit)
  - repo: local
    hooks:
      - id: pytest-integration
        name: pytest integration tests
        entry: bash -c 'source venv/bin/activate && python -m pytest tests/integration -v --tb=short'
        language: system
        pass_filenames: false
        always_run: true

  # E2E tests (real API calls, run before push if OPENAI_API_KEY is set)
  - repo: local
    hooks:
      - id: pytest-e2e
        name: pytest e2e tests
        entry: bash -c 'source venv/bin/activate && if [ -n "$OPENAI_API_KEY" ]; then python -m pytest tests/e2e/ -v --tb=short -m e2e; else echo "⚠️  E2E tests skipped (OPENAI_API_KEY not set)"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
