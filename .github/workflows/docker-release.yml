name: Studio Docker Release

on:
  workflow_run:
    workflows: ['Studio CI']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: studio-docker-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  docker-image:
    name: Docker image release/publish
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      version: ${{ steps.version.outputs.version || steps.version_local.outputs.version }}
      existing: ${{ steps.version.outputs.existing || steps.version_local.outputs.existing }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        if: env.ACT != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Use mounted workspace for act
        if: env.ACT == 'true'
        run: pwd

      - name: Compute release version (act)
        if: env.ACT == 'true'
        id: version_local
        run: |
          version="v0.0.0-act"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "existing=false" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute release version
        if: env.ACT != 'true'
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')

            const parseSemver = tag => {
              const match = /^v(\d+)\.(\d+)\.(\d+)$/.exec(tag)
              return match ? match.slice(1).map(Number) : null
            }

            const compareSemverDesc = (left, right) => {
              for (let index = 0; index < 3; index += 1) {
                if (left[index] !== right[index]) {
                  return right[index] - left[index]
                }
              }

              return 0
            }

            const formatSemver = ([major, minor, patch]) => `v${major}.${minor}.${patch}`
            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
            const packageVersion = parseSemver(`v${packageJson.version}`)
            const headSha = context.eventName === 'workflow_run'
              ? context.payload.workflow_run.head_sha
              : context.sha

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })

            const existingRelease = releases.find(release =>
              /^v\d+\.\d+\.\d+$/.test(release.tag_name) &&
              release.target_commitish === headSha,
            )

            if (existingRelease) {
              core.setOutput('version', existingRelease.tag_name)
              core.setOutput('existing', 'true')
              return
            }

            const releaseVersions = releases
              .map(release => parseSemver(release.tag_name))
              .filter(Boolean)

            if (!packageVersion) {
              core.setFailed('package.json version is not a valid semver string')
              return
            }

            const knownVersions = [packageVersion, ...releaseVersions].sort(compareSemverDesc)
            const highestVersion = knownVersions[0]
            const nextVersion = releaseVersions.length === 0
              ? packageVersion
              : [highestVersion[0], highestVersion[1] + 1, 0]

            core.setOutput('version', formatSemver(nextVersion))
            core.setOutput('existing', 'false')

      - name: Log in to GHCR
        if: env.ACT != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build locally with docker (act)
        if: env.ACT == 'true'
        run: |
          docker build \
            -t xscanner-studio:act-local \
            -t xscanner-studio:latest \
            --build-arg VITE_API_URL=http://localhost:8080 \
            --build-arg VITE_XSCANNER_API_URL=http://localhost:8080 \
            --build-arg VITE_LOG_LEVEL=info \
            --build-arg VITE_XSCANNER_RELEASE_TAG=${{ steps.version_local.outputs.version }} \
            -f "$GITHUB_WORKSPACE/Dockerfile" \
            "$GITHUB_WORKSPACE"

      - name: Build and push
        if: env.ACT != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/Dockerfile
          push: true
          tags: |
            ${{ format('ghcr.io/{0}:{1}', github.repository, steps.version.outputs.version) }}
            ${{ format('ghcr.io/{0}:latest', github.repository) }}
          labels: |
            org.opencontainers.image.title=xscanner-studio
            org.opencontainers.image.description=xScanner Studio frontend
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          build-args: |
            VITE_API_URL=${{ vars.XSCANNER_API_URL || 'http://localhost:8080' }}
            VITE_XSCANNER_API_URL=${{ vars.XSCANNER_API_URL || 'http://localhost:8080' }}
            VITE_LOG_LEVEL=info
            VITE_XSCANNER_RELEASE_TAG=${{ steps.version.outputs.version }}

  release:
    name: GitHub release
    if: needs.docker-image.outputs.existing != 'true'
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Skip release publishing in act
        if: env.ACT == 'true'
        run: echo "Skipping GitHub release creation under act"

      - name: Create release
        if: env.ACT != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.docker-image.outputs.version }}
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: ${{ needs.docker-image.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            Container images published to GHCR:
            - ghcr.io/${{ github.repository }}:${{ needs.docker-image.outputs.version }}
            - ghcr.io/${{ github.repository }}:latest
