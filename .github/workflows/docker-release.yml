name: Studio Docker Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: studio-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-image:
    name: Docker image build/publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: env.ACT != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=xscanner-studio
            org.opencontainers.image.description=xScanner Studio frontend

      - name: Docker metadata (act fallback)
        if: env.ACT == 'true'
        id: meta_local
        run: |
          echo "tags=xscanner-studio:act-local" >> "$GITHUB_OUTPUT"
          echo "labels=org.opencontainers.image.title=xscanner-studio" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags || steps.meta_local.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels || steps.meta_local.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.XSCANNER_API_URL }}
            VITE_LOG_LEVEL=info
            VITE_XSCANNER_RELEASE_TAG=${{ github.ref_name || github.sha }}

  release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            Container images published to GHCR:
            - ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            - ghcr.io/${{ github.repository }}:latest
