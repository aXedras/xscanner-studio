name: Studio CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: studio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio-checks:
    name: Studio checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Duplicate report (jscpd)
        run: npm run dup:report

      - name: Upload duplicate report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-report
          path: reports/jscpd/
          if-no-files-found: ignore

      - name: Full checks
        run: npm run check:all
