name: Studio CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (requires vars.XSCANNER_API_URL)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: studio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio-checks:
    name: Studio checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Duplicate report (jscpd)
        run: npm run dup:report

      - name: Upload duplicate report artifact
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-report
          path: reports/jscpd/
          if-no-files-found: ignore

      - name: Full checks
        run: npm run check:all

  integration-tests:
    name: Integration tests (optional)
    needs: studio-checks
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && inputs.run_integration == true) ||
      (github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'ci:integration'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_API_URL: ${{ vars.XSCANNER_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure integration API URL is configured
        run: |
          if [ -z "${VITE_API_URL}" ]; then
            echo "vars.XSCANNER_API_URL is not set." >&2
            echo "Set it in repository variables before enabling integration runs." >&2
            exit 1
          fi

      - name: Run integration tests
        run: npm run test:integration
