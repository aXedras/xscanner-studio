services:
  xscanner-api:
    image: ghcr.io/axedras/xscanner:${XSCANNER_RELEASE_TAG:-latest}
    env_file: .env.preprod
    environment:
      # Container-specific overrides (not in .env.preprod)
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      SERVER_WORKERS: 2
      LOG_FILE: /app/logs/xscanner.log
      XSCANNER_RELEASE_TAG: ${XSCANNER_RELEASE_TAG-}

      # Name mapping: app expects SUPABASE_URL, env file has SUPABASE_INTERNAL_URL
      SUPABASE_URL: ${SUPABASE_INTERNAL_URL}
    volumes:
      - ./logs:/app/logs
    ports:
      - "8010:8000"
    networks:
      default:
        aliases:
          - xscanner-api
      supabase: {}
    restart: unless-stopped

  xscanner-studio:
    image: ghcr.io/axedras/xscanner-studio:${XSCANNER_RELEASE_TAG:-latest}
    environment:
      VITE_API_URL: /api
      VITE_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      VITE_SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-extractions}
      VITE_LOG_LEVEL: ${STUDIO_LOG_LEVEL:-info}
      VITE_XSCANNER_RELEASE_TAG: ${XSCANNER_RELEASE_TAG-}
    ports:
      - "8090:80"
    restart: unless-stopped

networks:
  supabase:
    external: true
    name: supabase_network_xScanner
