server {
  listen 8080;
  server_name _;
  resolver 127.0.0.11 ipv6=off;

  # Allow larger uploads (images/PDFs) to be proxied to the API.
  # Default is 1m, which can easily trigger 413.
  client_max_body_size 50m;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy to the xScanner API (internal Docker network)
  location /api/ {
    set $xscanner_api http://xscanner-api:8000;
    proxy_pass $xscanner_api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;

    # Upload/extraction can take a while (LLM + OCR + persistence).
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # Avoid buffering large request bodies to disk.
    proxy_request_buffering off;
    proxy_buffering off;
  }
}
